name: Deploy FocusFlow to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: focusflow/package-lock.json
      - name: Install
        working-directory: focusflow
        run: npm ci
      - name: Build
        working-directory: focusflow
        run: npm run build
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: focusflow/dist
          publish_branch: gh-pages
